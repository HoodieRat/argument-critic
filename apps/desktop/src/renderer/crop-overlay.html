<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Select Capture Region</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #101010;
      }

      body {
        cursor: crosshair;
      }

      #preview {
        position: fixed;
        inset: 0;
        background-position: center;
        background-repeat: no-repeat;
        background-size: 100% 100%;
      }

      #preview::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(15, 15, 15, 0.42);
      }

      #selection {
        position: fixed;
        display: none;
        border: 2px solid #f5e2b8;
        background: rgba(245, 226, 184, 0.12);
        box-shadow: 0 0 0 9999px rgba(15, 15, 15, 0.42);
      }

      #hud {
        position: fixed;
        left: 24px;
        bottom: 24px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(16, 16, 16, 0.78);
        color: #fff7ea;
        max-width: 24rem;
        line-height: 1.45;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      #hud strong {
        display: block;
        margin-bottom: 0.35rem;
      }
    </style>
  </head>
  <body>
    <div id="preview"></div>
    <div id="selection"></div>
    <div id="hud">
      <strong>Select a region</strong>
      Drag to choose the crop area. Release to confirm. Press Esc to cancel.
    </div>
    <script type="module" src="./crop-overlay.ts"></script>
  </body>
</html>
